<!DOCTYPE html>
<html>

  <title>Make List</title>
  <link rel="stylesheet" href="style.css">

<body>

<h1>Make a List</h1>

<div class="input-row">
  <input id="itemName" placeholder="Item name">

<ul id="itemList"></ul>

<div class="footer-buttons">

  <a class="button" href="index.html">Back</a>
</div>

<script src="script.js"></script>
<script>
  loadLocalList();
  renderList();
</script>

</body>
</html>
